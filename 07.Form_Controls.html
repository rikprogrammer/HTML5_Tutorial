<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
<style type="text/css">
legend {
    display: block;
    padding-left: 2px;
    padding-right: 2px;
    border: none;
}

datalist { 
    display: none;
}
</style>
</head>
<body>
<!-- 
HTML forms are required if you want to collect some data 
from of the site visitor. 

An HTML form facilitates the user to enter data that is to 
be sent to the server for processing.
-->
<form action="server url" method="get or post(default is get)"> 

<!-- 
   The <fieldset> tag is used to group related elements in a form.
   The <fieldset> tag draws a box around the related elements.
-->
<fieldset>
    <legend>Login Info:</legend>
 <label for="email">Email: </label>  
              <input type="email" id="email" name="email" autofocus="autofocus" required="required" placeholder="Enter Email"/> 
  
<br/> 
<br/>

<label for="password">Password: </label>  
              <input type="password" id="password" name="password"/> 

</fieldset>
<br/> 
<br/>

<label for="name">Name: </label>  
              <input type="text" id="name" name="name" /> 

<br/> 
<br/>

<!-- 
 The iPhone and some Android devices using the input type="tel" to 
 change the virtual keyboard with a numeric keypad.
 -->
<label for="mobileno">Mobile No: </label>  
              <input type="tel" id="mobileno" name="mobileno"/> 

<br/> 
<br/>

<label for="dob">Date Of Birth:(Calender Will open in Chrome) </label>  
              <input type="date" id="dob" name="dob"/> 

<br/> 
<br/>

 <label for="gender">Gender: </label>  
              <input type="radio" id="gender" name="gender" value="male"/>Male  
              <input type="radio" id="gender" name="gender" value="female"/>Female 
              
<br/> 
<br/>

Hobby:<br>  
              <input type="checkbox" id="cricket" name="cricket" value="cricket"/>  
                     <label for="cricket">Cricket</label>  
              <input type="checkbox" id="football" name="football" value="football"/>  
                     <label for="football">Football</label>  
              <input type="checkbox" id="hockey" name="hockey" value="hockey"/>  
                     <label for="hockey">Hockey</label>  

<br/> 
<br/>
<label for="country">Select Country:</label>  
    <select name="country" id="country" style="width:160px">  
        <option value="india">india</option>  
        <option value="pakistan">pakistan</option>  
        <option value="africa">africa</option>  
        <option value="china">china</option>  
        <option value="other">other</option>  
</select>  

<br/> 
<br/>

<label for="datalistexample">DataList Example:</label>  
<!-- 
An <input> element with pre-defined values in a <datalist> 

The <datalist> tag is used to provide an "autocomplete" feature on 
<input> elements. Users will see a drop-down list of pre-defined 
options as they input data.

-->
<input list="browsers">
  <datalist id="browsers">
      <option value="Internet Explorer">
      <option value="Firefox">
      <option value="Chrome">
      <option value="Opera">
      <option value="Safari">
   </datalist>
  
<br/> 
<br/>

<label for="datalistexample">OptionGroup Example:</label>
   <select name="country1" id="country1">
      <optgroup label="Australia">
           <option value ="sydney">Sydney</option>
           <option value ="melbourne">Melbourne</option>
      </optgroup>

      <optgroup label="New Zealand">
          <option value ="cromwell">Cromwell</option>
          <option value ="queenstown">Queenstown</option>
      </optgroup>
</select>

<br/> 
<br/>

<label for="ADDRESS">Address:</label>  
     <textarea rows="6" cols="20"></textarea>  
   
<br/> 
<br/>
<!-- 

A search field typically behaves like a regular text field, 
but in some browser like Google Chrome and Apple Safari as soon as you start 
typing in a search box a small cross appears on the right side of the field 
that lets you quickly clear the search field.

 -->
<label for="search">Search:</label>  
    <input type="search" id="mysearch" name="mysearch" placeholder="Search"/>
   

<br/> 
<br/>

<label for="file-select">Select File:</label>
        <input type="file" name="upload" id="file-select">

<br/> 
<br/>

<h4>HIDDEN TEXT FIELD..VIEW SOURCE CODE.. LINE NO 163</h4>
<input type="hidden" name="hiddentextfield" id="hiddentextfield">

<input type="submit" value="Register">
<input type="reset" value="Clear">   
<input type="image" src="images/goodmorning.jpg" width="15%" height="15%">

</form>  

</body>
</html>
