<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
<style type="text/css">

article { 
    display: block;
}

header { 
    display: block;
}

footer { 
    display: block;
}

</style>
</head>
<body>
<!-- 
The <article> tag specifies independent, self-contained content.

Potential sources for the <article> element:

Forum post
Blog post
News story
Comment
 -->

<!-- 
The <header> element represents a container for introductory content 
or a set of navigational links.

A <header> element typically contains:

one or more heading elements (<h1> - <h6>)
logo or icon
authorship information

You can have several <header> elements in one document.

Note: A <header> tag cannot be placed within a 
<footer>, <address> or another <header> element.

 -->

<article>
  <header>
    <h3>HEADING INFORMATION</h3>
    <h1>Most important heading here</h1>
    <h3>Less important heading here</h3>
    <p>Some additional information here.</p>
  </header>
  <p>CHANDAN MUKHERJEE.</p>
</article>

<br/>
<br/>
<br/>

<!-- 
The <footer> tag defines a footer for a document or section.

A <footer> element should contain information about its containing 
element.

A <footer> element typically contains:
authorship information
copyright information
contact information
sitemap
back to top links
related documents

You can have several <footer> elements in one document.
-->

<footer> 
   <h3>FOOTER INFORMATION</h3> 
   <p>Posted by: Chandan Mukherjee</p>  
   
    <address> 80, Ramlal Dutta Road, Bhadrakali, Hooghly </address>   
    
   <p>Contact information:   
         <a href="mailto:chan.muk@gmail.com">chan.muk@gmail.com</a>.  
   </p>  

</footer>  

</body>
</html>
